  - {type: variant, offset: 10498, length: 61, content: 𭍇毘庾反弊＝𡃇【甲】弊【大】，𡃇【甲】弊𡃇毘也反底＝𫪭【甲】底【大】，𫪭【甲】底𫪭丁以反󰴎儞入聲𭍑他以反。凡真言中平聲字皆稍上聲呼之。若諸＋（語）【甲】諸【大】，諸語【甲】諸諸語與下字相連，亦可逐便以入聲呼之。如婆伽梵呼為薄伽梵之類是也, 宋: '', 元: '', 明: '', 宮: ''}
