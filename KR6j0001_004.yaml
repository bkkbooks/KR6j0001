body:
  text: 大唐天竺三藏善無畏共沙門一行譯密印品第九爾時薄伽梵毗盧遮那觀察諸大衆會告執金剛祕密主言祕密主有同如來莊嚴具同法界趣幖幟菩薩由是嚴身故處生死中巡歷諸趣於一切如來大會以此大菩提幢而幖幟之諸天龍夜叉乾達婆阿蘇囉揭嚕茶緊那囉摩睺羅伽人非人等敬而繞之受教而行汝今諦聽極善思念吾當演説如是説已金剛手白言世尊今正是時世尊今正是時爾時薄伽梵即便住於身無害力三昧住斯定故説一切如來入三昧耶遍一切無能障礙力無等三昧力明妃曰南麼三曼多勃馱喃一阿三迷二呾履二合三迷三三麼曳四莎訶五祕密主如是明妃示現一切如來地不越三法道界圓滿地波羅蜜是密印相當用定慧手作空心合掌以定慧二虛空輪並合而建立之頌曰此一切諸佛救世之大印正覺三昧耶於此印而住又以定慧手為拳虛空輪入於掌中而舒風輪是為淨法界印真言曰南麼三曼多勃陀喃一達摩馱睹二薩嚩二合婆嚩句痕三復以定慧手五輪皆等迭翻相鉤二虛空輪首俱相向頌曰是名為勝願吉祥法輪印世依救世者悉皆轉此輪真言曰南麼三曼多勃馱喃一伐折囉引二合呾麼二合句痕二復舒定慧二手作歸命合掌風輪相捻以二空輪加於上形如朅伽頌曰此大慧刀印一切佛所説能斷於諸見謂俱生身見真言曰南麼三曼多勃馱喃一摩訶朅伽微囉闍二達麼珊捺囉奢二合迦娑訶闍三薩迦耶捺㗚二合瑟致上二合掣叱曳反諾入迦四怛他引蘖多引地目訖底丁以反二合儞入社多五微囉引伽達摩儞入社多𤙖六復以定慧二手作虛心合掌屈二風輪以二空輪絞之形如商佉頌曰此名為勝願吉祥法螺印諸佛世之師菩薩救世者皆説無垢法至寂靜涅槃真言曰南麼三曼多勃馱喃一暗復以定慧手相合普舒散之猶如健吒二地輪二空輪相持令火風輪和合頌曰吉祥願蓮華諸佛救世者不壞金剛座覺悟名為佛菩提與佛子悉皆從是生真言曰南麼三曼多勃馱喃一阿去急呼復以定慧手五輪外向為拳建立火輪舒二風輪屈為鉤形在傍持之虛空地輪並而直上水輪交合如拔折囉頌曰金剛大慧印能壞無智城曉寤睡眠者天人不能壞真言曰南麼三曼多伐折羅二合赧一𤙖復以定慧手五輪內向為拳建立火輪以二風輪置傍屈二虛空相並頌曰此印摩訶印所謂如來頂適才結作之即同於世尊真言曰南麼三曼多勃馱喃一𤙖𤙖復以智慧手為拳置於眉間頌曰此名毫相藏佛常滿願印以才作此故即同仁中勝真言曰南麼三曼多勃馱喃一阿去急呼痕若急呼住瑜伽座持鉢相應以定慧手俱在臍間是名釋迦牟尼大鉢印真言曰南麼三曼多勃馱喃一婆上急呼復次以智慧手上向而作施無畏形頌曰能施與一切衆生類無畏若結此大印名施無畏者真言曰南麼三曼多勃馱喃一薩婆他二爾娜爾娜三佩也那奢娜四莎訶五復次以智慧手下垂作施願形頌曰如是與願印世依之所説適才結此者諸佛滿其願真言曰南麼三曼多勃馱喃一嚩囉娜伐折囉二合引怛麼二合迦二莎訶復以智慧手為拳而舒風輪以毗俱胝形住於等引頌曰以如是大印諸佛救世尊恐怖諸障者隨意成悉地由結是印故大惡魔軍衆及餘諸障者馳散無所礙真言曰南麼三曼多勃馱喃一麼訶引沫羅嚩底丁以反二捺奢嚩路嗢婆二合吠平三摩訶引昧怛𭌆也三合毗庾二合嗢蘗二合底丁以反四莎訶復次以智慧手為拳而舒火輪水輪以虛空輪而在其下頌曰此名一切佛世依悲生眼想置於眼界智者成佛眼真言曰南麼三曼多勃馱喃一伽伽那嚩囉洛吃灑二合儜上二迦嚕儜麼那三怛他引蘗多斫吃芻二合四莎訶復次以定摩手五輪內向為拳而舒風輪圓屈相合頌曰此勝願索印壞諸造惡者真言者結之能縛諸不善真言曰南麼三曼多勃馱喃一係係摩訶引播奢二鉢羅二合娑嘮那𭌆也二合三薩埵馱睹四微模訶迦五怛他引蘖多引地目吃底丁以反二合儞入社多六莎訶七復次以定慧手一合為拳舒智慧手風輪屈第三節猶如環相頌曰如是名鉤印諸佛救世者招集於一切住於十地位菩提大心者及惡思衆生真言曰南麼三曼多勃馱喃一阿去急呼薩婆怛囉引二合鉢囉二合底丁以反訶諦二怛他引蘖黨矩奢三菩提浙𭌆耶二合鉢𭌆布邏迦四莎訶五即此鉤印舒其火輪而少屈之是謂如來心印彼真言曰南麼三曼多勃馱喃一壤怒嗢婆二合嚩二莎訶三復以此印舒其水輪而竪立之名如來臍印彼真言曰南麼三曼多勃馱喃一阿沒㗚二合覩嗢婆二合嚩二莎訶即以此印直舒水輪餘亦竪之名如來腰印彼真言曰南麼三曼多勃馱喃一怛他引蘗多三婆嚩二莎訶復以定慧手作空心合掌以二風輪屈入於內二水輪亦然其二地輪令少屈而伸火輪此是如來藏印彼真言曰南麼薩婆怛他引蘗帝弊毗也反一㘕㘕𡀩𡀩二莎嚩二合訶即以此印散其水輪向上置之名大界印彼真言曰南麼三曼多勃馱喃一麗魯補𭌆微矩麗二莎訶三即以此印其二火輪鉤屈相合散舒風輪名無堪忍大護印彼真言曰南麼薩婆怛他引蘗帝弊毗也反下同一薩婆佩也微蘗帝弊二微濕嚩目契弊三薩婆他引四唅欠五囉訖灑二合摩訶引沫麗六薩婆怛他引蘗多本抳也二合儜入社帝七𤙖𤙖八怛囉引二合吒輕怛囉吒同上九阿鉢囉二合底丁以反訶諦十莎訶十一復以風輪而散舒之空輪並入其中名普光印彼真言曰南麼三曼多勃馱喃一入嚩引二合囉引摩履儞平二怛他引蘗多㗚旨二合三莎訶四又以定慧手作空心合掌以二風輪持火輪側名如來甲印屈二水輪二空輪合入掌中押二水輪甲上是如來舌相印真言曰南麼三曼多勃馱喃一怛他引蘗多爾訶嚩二合二薩底也二合達摩鉢囉二合瑟恥二合多三莎訶四以此印令風水輪屈而相捻空輪向上而少屈之火輪正直相合地輪亦如是名如來語門印彼真言曰南麼三曼多勃馱喃一怛他引蘗多摩訶引嚩無各反吃怛囉三合二微濕嚩二合壤引曩摩護娜也三莎訶四如前印以二風輪屈入掌中向上名如來牙印彼真言曰南麼三曼多勃馱喃一怛他引蘗多能去瑟吒羅三合二囉娑囉娑引釳囉二合三參鉢囉引二合博迦四薩婆怛他引蘗多五微灑也參婆上嚩六莎訶七又如前印相以二風輪向上置之屈第三節名如來辨説印彼真言曰南麼三曼多勃馱喃一阿振底也二合娜部二合多二𡀔波嚩引三摩哆上鉢囉引二合鉢多二合三微輸上馱娑嚩二合囉四莎訶復次以定慧手和合一相作空心合掌二地輪空輪屈入相合此是如來持十力印彼真言曰南麼三曼多勃馱喃一捺奢麼浪伽輕達囉二𤙖參髯三莎訶四又如前印以二空輪風輪屈上節相合是如來念處印彼真言曰南麼三曼多勃馱喃一怛他引蘗多娑麼㗚三合底二薩埵係哆弊毗庾反嗢蘗多三伽伽那糝忙引糝麼四莎訶四又如前印以二空輪在水輪上名一切法平等開悟印彼真言曰南麼三曼多勃馱喃一薩婆達摩三麼哆鉢囉引二合鉢多二合二怛他引蘗哆弩蘗多三莎訶四復以定慧手合為一以二風輪加火輪上餘如前是普賢如意珠印彼真言曰南麼三曼多勃馱喃一參麼哆弩蘗多二微囉若達摩儞入社多三摩訶引摩訶四莎訶五即此虛心合掌以二風輪屈在二火輪下餘如前是慈氏印彼真言曰南麼三曼多勃馱喃一阿爾單若也二薩婆薩埵引奢夜弩蘗多三莎訶四又如前印以二虛空輪入中名虛空藏印真言曰南麼三曼多勃馱喃一阿去迦引奢參麼哆弩蘗多二微質怛㘕二合嚩囉達囉三莎訶四又如前印以二水輪二地輪屈入掌中二風輪火輪相合是除一切蓋障印彼真言曰南麼三曼多勃馱喃一阿去急呼薩埵係哆弊毗庾反嗢蘗多二怛㘕二合三㘕㘕四莎訶五如前以定慧手相合散舒五輪猶如鈴鐸以虛空地輪和合相持作蓮華形是觀自在印真言曰南麼三曼多勃馱喃一薩婆怛他引蘗哆嚩路吉多二羯嚕儜麼也三囉囉囉𤙖若四莎訶五如前以定慧手作空心合掌猶如未開敷蓮是得大勢印彼真言曰南麼三曼多勃馱喃一髯髯娑急呼二莎訶三如前以定慧手五輪內向為拳舉二風輪猶如針鋒二虛空輪加之是多羅尊印彼真言曰南麼三曼多勃馱喃一哆囇哆𭌆抳二羯嚕拏嗢婆上二合吠平三莎訶四如前印舉二風輪參差相押是毗俱胝印彼真言曰南麼三曼多勃馱喃一薩婆佩也怛囉引二合散儞入二𤙖娑破二合吒也三莎訶四如前以定慧手空心合掌水輪空輪皆入於中是白處尊印彼真言曰南麼三曼多勃馱喃一怛他引蘗多微灑也三婆上吠平二鉢曇摩二合忙𭌆儞入三莎訶四如前印屈二風輪置虛空輪下相去猶如穬麥是何耶揭哩嚩印彼真言曰南麼三曼多勃馱喃一佉娜也畔若娑破二合吒也二莎訶三同前印申二水輪風輪餘如拳是地藏菩薩印彼真言曰南麼三曼多勃馱喃一訶訶訶二蘇上怛弩三莎訶四復以定慧手作空中合掌火輪水輪交結相持以二風輪置二虛空輪上猶如鉤形餘如前是聖者文殊師利印彼真言曰南麼三曼多勃馱喃一係係矩忙囉二微目吃底二合鉢他悉體他以反二合多三娑麼二合囉娑麼二合囉四鉢囉二合底然五莎訶六以三昧手為拳而舉風輪猶如鉤形是光網鉤印彼真言曰南麼三曼多勃馱喃一係係矩忙引囉二忙引耶蘗多娑嚩二合婆去嚩悉體他以反二合多三莎訶四即如前印一切輪相皆少屈之是無垢光印彼真言曰南麼三曼多勃馱喃一係矩忙引囉二微質怛囉二合蘗底矩忙引囉三麼弩娑麼二合囉四莎訶五如前以智慧手為拳其風火輪相合為一舒之是繼室尼刀印彼真言曰南麼三曼多勃馱喃一係係矩忙引𭌆計二娜耶壤難娑摩二合囉三鉢囉二合底然四莎訶五如前以智慧手為拳而申火輪猶如戟形是優波髻室尼戟印彼真言曰南麼三曼多勃馱喃一頻去娜夜壤難二係矩忙引𭌆計三莎訶四如前以三昧手為拳而舒水輪地輪是地慧幢印彼真言曰南麼三曼多勃馱喃一係娑麼二合囉壤那計覩二莎訶三以慧手為拳而舒風輪猶如鉤形是請召童子印彼真言曰南麼三曼多勃馱喃一阿去羯囉灑二合也薩鑁引二矩嚕阿去然三矩忙引囉寫四莎訶五如前以定慧手為拳舒二風輪屈節相合是諸奉教者印彼真言曰南麼三曼多勃馱喃一阿去急呼微娑麼二合也儜曳平二莎訶三如前以定慧手為拳而舒火輪屈第三節是除疑怪金剛印彼真言曰南麼三曼多勃馱喃一微麼底掣鵄曳反諾迦二莎訶三舉毗鉢舍那臂作施無畏手是施無畏者印彼真言曰南麼三曼多勃馱喃一阿佩延娜娜二莎訶三如前舒智手而上舉之是除惡趣印彼真言曰南麼三曼多勃馱喃一阿弊毗庾反達囉儜上薩埵馱敦二莎訶三如前以慧手掩心是救護慧印彼真言曰南麼三曼多勃馱喃一係摩訶引摩訶二娑麼二合囉鉢囉二合底然三莎訶四如前以慧手作持華狀是大慈生印彼真言曰南麼三曼多勃馱喃一娑嚩二合制妬嗢蘗二合多二莎訶三如前以慧手覆心稍屈火輪是悲念者印彼真言曰南麼三曼多勃馱喃一羯嚕儜沒麗二合眤多二莎訶三如前以慧手作施願相是除一切熱惱印彼真言曰南麼三曼多勃馱喃一係嚩囉娜二嚩囉鉢囉二合引鉢多二合三莎訶四如前以智慧手如執持真多摩尼寶形是不思議慧印彼真言曰南麼三曼多勃馱喃一薩摩舍鉢𭌆布囉二莎訶三如前以定慧手為拳令二火輪開敷是地藏旗印彼真言曰南麼三曼多勃馱喃一訶訶訶微娑麼二合曳平二莎訶三慧手為拳而舒三輪是寶處印彼真言曰南麼三曼多勃馱喃一係摩訶引摩訶二莎訶三以此慧手舒其水輪是寶手菩薩印彼真言曰南麼三曼多勃馱喃一囉怛怒二合嗢婆上嚩二莎訶三以定慧手作返相叉合掌定手空輪慧手地輪相交般若於三昧亦復如是餘如跋折羅狀是持地印彼真言曰南麼三曼多勃馱喃一達囉尼尼仁反達囉二莎訶三如前作五股金剛戟形是寶印手印彼真言曰南麼三曼多勃馱喃一囉怛娜二合儞入喇爾二合多二莎訶三即以此印令一切輪相合是發堅固意印彼真言曰南麼三曼多勃馱喃一伐折囉二合三婆嚩二莎訶三如前以定慧二手作刀是虛空無垢菩薩印彼真言曰南麼三曼多勃馱喃一伽伽娜引難多愚者囉莎訶如前輪印是虛空慧印彼真言曰南麼三曼多勃馱喃一斫吃囉二合嚩入喇底丁以反二合二莎訶三如前商佉印是清淨慧印彼真言曰南麼三曼多勃馱喃一達磨三婆嚩二莎訶三如前蓮華印是行慧印彼真言曰南麼三曼多勃馱喃一鉢曇摩二合囉上耶二莎訶三同前青蓮華印而稍開敷是安住慧印彼真言曰南麼三曼多勃馱喃一壤弩嗢婆二合嚩二莎訶三如前以二手相合而屈水輪相交入於掌中二火輪地輪向上相持而舒風輪屈第三節令不相著猶如穬麥是執金剛印彼真言曰南麼三曼多伐折囉赧一戰拏摩訶引𡀔灑拏𤙖二如前印以二空輪地輪屈入掌中是忙莽雞印彼真言曰南麼三曼多伐折囉赧一怛㗚二合吒輕怛㗚吒同上二若衍底丁以反莎訶二如前以定慧手諸輪返叉相糾向於自體而旋轉之般若空輪加三昧虛輪是金剛鎖印彼真言曰南麼三曼多伐折囉赧一𤙖滿馱滿馱二慕吒耶慕吒耶三伐折𡀔嗢婆二合吠平四薩婆怛囉引二合鉢囉二合底丁以反訶帝五莎訶六以此金剛鎖印少屈虛空輪以持風輪而不相至是忿怒月黶印彼真言曰南麼三曼多伐折囉二合赧一曷唎二合急呼𤙖發吒輕二莎訶三如前以定慧手為拳建立二風輪而以相持是金剛針印彼真言曰南麼三曼多伐折囉二合赧一薩婆達磨儞入吠達儞二伐折囉引二合素旨嚩囉泥三莎訶四如前以定慧手為拳而置於心是金剛拳印彼真言曰南麼三曼多伐折囉二合赧一薩破二合吒也伐折囉二合三婆吠平二莎訶三以三昧手為拳舉翼開敷智慧手亦作拳而舒風輪如忿怒相擬形是無能勝印彼真言曰南麼三曼多伐折囉二合赧一訥達𭌆沙二合摩訶引嚧灑拏二佉引捺耶薩鑁引怛他引蘗單然矩嚕三莎訶四以定慧手為拳作相擊勢持之是阿毗目佉印彼真言曰南麼三曼多伐折囉二合赧一係阿毗目佉摩訶鉢囉二合戰拏二佉引娜也緊旨囉引也徙三三麼耶麼弩薩麼囉二合囉四莎訶五如前持鉢相是釋迦鉢印彼真言曰南麼三曼多勃馱喃一薩嚩訖麗二合奢儞入素捺耶二薩婆達摩嚩始多引鉢囉二合鉢多三伽伽那三迷四莎訶五釋迦毫相印如上又以慧手指峯聚置頂上是一切佛頂印彼真言曰南麼三曼多勃馱喃一鑁鑁二𤙖𤙖𤙖三發吒輕四莎訶五以三昧手為拳舒火風輪而以虛空加地水輪上其智慧手申風火輪入三昧掌中亦以虛空加地水輪上如在刀鞘是不動尊印如前金剛慧印是降三世印如前以定慧手合為一相其地水輪皆向下而申火輪二峯相連屈二風輪置於第三節上並虛空輪如三目形是如來頂印佛菩薩母復以三昧手覆而舒之慧手為拳而舉風輪猶如蓋形是白傘佛頂印如前刀印是勝佛頂印如前輪印是最勝佛頂印如前鉤印慧手為拳舉其風輪而少屈之是除業佛頂印如前佛頂印是火聚佛頂印如前蓮華印是發生佛頂印如前商佉印是無量音聲佛頂印以智慧手為拳置在眉間是真多摩尼毫相印如前佛頂印是佛眼印復有少異所謂金剛標相智慧手在心如執蓮華像直申奢摩他臂五輪上舒而外向距之是無能勝印定慧手向內為拳二虛空輪上向屈之如口是無能勝明妃印以智慧手承頰是自在天印即以此印令風火輪差戾申之是普華天子印同前印以虛空輪在於掌中是光鬘天子印同前印以虛空風輪作持華相是滿意天子印以智慧手虛空水輪相加其風火輪地輪皆散舒之以掩其耳是遍音聲天印定慧相合二虛空輪圓屈其餘四輪亦如是是名地神印如前以智慧手作施無畏相以空輪在於掌中是請召火天印即以施無畏形以虛空輪持水輪第二節是一切諸仙印隨其次第相應用之如前以定慧手相合風輪地輪入於掌中餘皆上向是焰摩但茶印慧手向下猶如健吒是焰摩妃鐸印以三昧手為拳舒風火輪是暗夜天印即以此印又屈風輪是嚕達羅戟印如前印作持蓮華形是梵天明妃印如前印屈其風輪加火輪背第三節是嬌末離爍底印即以此印令風輪加虛空上是那羅延后輪印三昧手為拳令虛空輪直上是焰魔七母鎚印仰其定手如持劫鉢羅相是遮文茶印如前朅伽印是涅哩底刀印如前輪印以三昧手為之是那羅延輪印以轉定慧手左右相加是難徒拔難陀二雲印如前申三昧手虛空地輪相加是商羯羅三戟印如前伸三昧手虛空地輪相持是商羯羅后印即以此印直舒三輪是商羯羅妃印以三昧手作蓮華相是梵天印因作潔白觀是月天印以定慧手顯現合掌屈虛空輪置水輪側是日天輿輅印合般若三昧手地輪風輪內向其水火輪相持如弓是社耶毗社耶印如前幢印是風天印仰三昧手在於臍輪智慧手空風相持向身運動如奏音樂是妙音天費拏印如前羂索印是諸龍印如前妙音天印而屈風輪交空輪上是一切阿修羅印真言曰南麼三曼多勃馱喃一蘖囉邏延二莎訶三內向為拳而舒水輪是乾闥婆印真言曰南麼三曼多勃馱喃一微輸馱薩嚩二合囉嚩引係儞平二莎訶三即以此印而屈風輪是一切藥叉印真言曰南麼三曼多勃馱喃一藥乞叉二合濕嚩二合囉二合莎訶三又以此印虛空輪地輪相持而申火風是藥叉女印真言曰南麼三曼多勃馱喃一藥乞叉二合尾儞耶二合達𭌆二莎訶三內向為拳而舒火輪是諸毗舍遮印真言曰南麼三曼多勃馱喃一比舍引遮蘖底丁以反二莎訶三改屈火輪是諸毗舍支印真言曰南麼三曼多勃馱喃一比旨比旨二莎訶三如前以定慧手相合並虛空輪而建立之是一切執曜印真言曰南麼三曼多勃馱喃一蘖囉二合醯濕靺二合𭌆耶二合鉢囉引二合鉢多二合二孺底丁以反麼耶三莎訶四復以此印虛空火輪相交是一切宿印真言曰南麼三曼多勃馱喃一娜吃灑二合怛囉二合二儞入囊捺儞平曳三莎訶四即以此印屈二水輪入於掌中是諸羅剎娑印真言曰南麼三曼多勃馱喃一囉引吃灑二合娑引地鉢多曳二莎訶三申三昧手以覆面門爾賀嚩觸之是諸荼吉尼印真言曰南麼三曼多勃馱喃一頡𭌆二合莎訶急呼二祕密主如是上首諸如來印從如來信解生即同菩薩之幖幟其數無量又祕密主乃至身分舉動住止應知皆是密印舌相所轉衆多言説應知皆是真言是故祕密主真言門修菩薩行諸菩薩已發菩提心應當住如來地畫漫荼羅若異此者同謗諸佛菩薩越三昧耶決定墮於惡趣
