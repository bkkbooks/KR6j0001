body:
  text: 爾時毗盧遮那世尊與一切諸佛同共集會各各宣説一切聲聞緣覺菩薩三昧道時佛入於一切如來一體速疾力三昧於是世尊復告執金剛菩薩言我昔坐道場降伏於四魔以大勤勇聲除衆生怖畏是時梵天等心喜共稱説由此諸世間號名大勤勇我覺本不生出過語言道諸過得解脫遠離於因緣知空等虛空如實相智生已離一切暗第一實無垢諸趣唯想名佛相亦復然此第一實際以加持力故為度於世間而以文字説爾時執金剛具德者得未曾有開敷眼頂禮一切智而説偈言諸佛甚希有權智不思議離一切戲論諸佛自然智而為世間説滿足衆希願真言相如是常依於二諦若有諸衆生知此法教者世人應供養猶如敬制底時執金剛説此偈已諦觀毗盧遮那目不暫瞬默然而住於是世尊復告執金剛祕密主言復次祕密主一生補處菩薩住佛地三昧道離於造作知世間相住於業地堅住佛地復次祕密主八地自在菩薩三昧道不得一切諸法離於有生知一切幻化是故世稱觀自在者復次祕密主聲聞衆住有緣地識生滅除二邊極觀察智得不隨順修行因是名聲聞三昧道祕密主緣覺觀察因果住無言説法不轉無言説於一切法證極滅語言三昧是名緣覺三昧道祕密主世間因果及業若生若滅繫屬他主空三昧生是名世間三昧道爾時世尊而説偈言祕密主當知此等三昧道若住佛世尊菩薩救世者緣覺聲聞説摧害於諸過若諸天世間真言法教道如是勤勇者為利衆生故復次世尊告執金剛祕密主言祕密主汝當諦聽諸真言相金剛手言唯然世尊願樂欲聞爾時世尊復説頌曰等正覺真言言名成立相如因陀羅宗諸義利成就有增加法句本名行相應若唵字𤙖字及與潑磔迦或頡唎等是佛頂名號若揭㗚佷拏佉陀耶畔闍訶娜摩囉也鉢吒也等類是奉教使者諸忿怒真言若有納麼字及莎縛訶等是修三摩地寂行者標相若有扇多字微戍陀字等當知能滿足一切所希願此正覺佛子救世者真言若聲聞所説一一句安布是中辟支佛復有少差別謂三昧分異淨除於業生復次祕密主此真言相非一切諸佛所作不令他作亦不隨喜何以故以是諸法法如是故若諸如來出現若諸如來不出諸法法爾如是住謂諸真言真言法爾故祕密主成等正覺一切知者一切見者出興于世而自此法説種種道隨種種樂欲種種諸衆生心以種種句種種文種種隨方語言種種諸趣音聲而以加持説真言道祕密主云何如來真言道謂加持此書寫文字祕密主如來無量百千俱胝那庾多劫積集修行真實諦語四聖諦四念處四神足十如來力六波羅蜜七菩提寶四梵住十八佛不共法祕密主以要言之諸如來一切智智一切如來自福智力自願智力一切法界加持力隨順衆生如其種類開示真言教法云何真言教法謂阿字門一切諸法本不生故迦字門一切諸法離作業故佉字門一切諸法等虛空不可得故哦字門一切諸法一切行不可得故伽重聲字門一切諸法一合不可得故遮字門一切諸法離一切遷變故車字門一切諸法影像不可得故若字門一切諸法生不可得故社字門一切諸法戰敵不可得故吒字門一切諸法慢不可得故吒字門一切諸法長養不可得故拏字門一切諸法怨對不可得故荼重聲字門一切諸法執持不可得故多字門一切諸法如如不可得故他字門一切諸法住處不可得故娜字門一切諸法施不可得故馱重聲字門一切諸法法界不可得故波字門一切諸法第一義諦不可得故頗字門一切諸法不堅如聚沫故麼字門一切諸法縛不可得故婆字門一切諸法一切有不可得故野字門一切諸法一切乘不可得故囉字門一切諸法離一切諸塵染故邏字門一切諸法一切相不可得故縛字門一切諸法語言道斷故奢字門一切諸法本性寂故沙字門一切諸法性鈍故娑字門一切諸法一切諦不可得故訶字門一切諸法因不可得故祕密主仰若拏那麼於一切三昧自在速能成辨諸事所為義利皆悉成就爾時世尊而説偈言真言三昧門圓滿一切願所謂諸如來不可思議果具足衆勝願真言決定義超越於三世無垢同虛空住不思議心起作諸事業到修行地者授不思議果是第一真實諸佛所開示若知此法教當得諸悉地最勝真實聲真言真言相行者諦思惟當得不壞句爾時執金剛祕密主白佛言希有世尊佛説不思議真言相道法不共一切聲聞緣覺亦非普為一切衆生若信此真言道者諸功德法皆當滿足唯願世尊次説漫荼羅所須次第如是説已世尊復告金剛手而説偈言持真言行者供養諸聖尊當奉悅意花潔白黃朱色鉢頭摩青蓮龍花奔那伽計薩囉末利得蘗藍瞻蔔無憂底羅劍鉢吒羅娑羅是等鮮妙華吉祥衆所樂採集以為鬘敬心而供養栴檀及青木苜蓿香鬱金及餘妙塗香盡持以奉獻沈水及松香嚩藍與龍腦白檀膠香等失利婆塞迦及餘焚香類芬馥世稱美應當隨法教而奉於聖尊復次大衆生依教獻諸食奉乳糜酪飯歡喜漫荼迦百葉甘美餅淨妙粆糖餅布利迦間究及末塗失囉諾迦無憂播鉢吒食等如是諸肴膳種種珍妙果蹇荼與石蜜糖蜜生熟酥種種諸漿飲乳酪淨牛味又奉諸燈燭異類新淨器盛滿妙香油布列為照明四方繒憣蓋種種色相間門標異形類并懸以鈴鐸或以心供養一切皆作之持真言行者存意勿遺忘次具迦羅奢或六或十八備足諸寶藥盛滿衆香水枝條上垂布間插華果實塗香等嚴飾結護而作淨繫頸以妙衣瓶數或增廣上首諸尊等各各奉兼服諸餘大有情一一皆獻之如是修供養次引應度者灑之以淨水授與塗香華令發菩提心憶念諸如來一切皆當得生於淨佛家結法界生印及與法輪印金剛有情等而用作加護次應當自結諸佛三昧耶三轉加淨衣如真言法教而用覆其首深起悲念心三誦三昧耶頂戴以囉字嚴以大空點周匝開焰鬘字門生白光流出如滿月現對諸救世而散於淨華隨其所至處行人而尊奉漫荼羅初門大龍廂衛處於二門中間安立於學人住彼隨法教而作衆事業如是令弟子遠離於諸過作寂然護摩護摩依法住初自中胎藏至第二之外於漫茶羅中作無疑慮心如其自肘量陷作光明壇四節為周界中表金剛印師位之右方護摩具支分學人住其左蹲踞增敬心自敷吉祥草藉地以安坐或布衆綵色彤輝極嚴麗一切繢事成是略護摩處周匝布祥茅端坐互相加右旋皆廣厚遍灑以香水思惟火光尊哀愍一切故應當持滿器而以供養之爾時善住者當説是真語南麼三曼多勃馱喃一惡揭娜二合曳平二莎訶三復以三昧手次持諸弟子慧手大空指略奉持護摩每獻輒誠誦各別至三七當住慈愍心依法真實言南麼三曼多勃馱喃一阿去摩訶引扇底丁以反下同蘗多二扇底羯囉三鉢囉二合睒摩達磨儞入若引多四阿婆去嚩薩嚩二合婆引嚩五達麼娑麼多引鉢囉二合鉢多二合六莎訶七行者護摩竟應教令襯施金銀衆珍寶象馬及車乘牛羊上衣服或復餘資財弟子當至誠恭敬起殷重深心自欣慶而奉於所尊以修行淨捨令彼歡喜故已為作加護應召而告言今此勝福田一切佛所説為欲廣饒益一切諸有情奉施一切僧當獲於大果無盡大資財世説常隨生以供養僧者施具德之人是故世尊説應當發歡喜隨力辦肴膳而施現前僧爾時毗盧遮那世尊復告執金剛祕密主而説偈言汝摩訶薩埵一心應諦聽當廣説灌頂古佛所開示師作第二壇對中漫荼羅圖畫於外界相距二肘量四方正均等內向開一門安四執金剛居其四維外謂住無戲論及虛空無垢無垢眼金剛被雜色衣等內心大蓮華八葉及鬚蘂於四方葉中四伴侶菩薩由彼大有情往昔願力故云何名為四謂總持自在念持利益心悲者菩薩等所餘諸四葉作四奉教者雜色衣滿願無礙及解脫中央示法界不可思議色四寶所成瓶盛滿衆藥寶普賢慈氏尊及與除蓋障除一切惡趣而以作加持彼於灌頂時當置妙蓮上獻以塗香華燈明及閼伽上蔭幢幡蓋奉攝意音樂吉慶伽陀等廣多美妙言如是而供養令得歡喜已親對諸如來而自灌其頂復當供養彼妙善諸香華次應執金篦在於彼前住慰喻令歡喜説如是伽他佛子佛為汝決除無智膜猶如世醫王善用以金籌持真言行者復當執明鏡為顯無相法説是妙伽他諸法無形像清澄無垢濁無執離言説但從因業起如是知此法自性無染污為世無比利汝從佛心生次當授法輪置以二足間慧手傳法螺復説如是偈汝自於今日轉於救世輪其聲普周遍吹無上法螺勿生於異慧當離疑悔心開示於世間勝行真言道常作如是願宣唱佛恩德一切持金剛皆當護念汝次當於弟子而起悲念心行者應入中示三昧耶偈佛子汝從今不惜身命故常不應捨法捨離菩提心慳吝一切法不利衆生行佛説三昧耶汝善住戒者如護自身命護戒亦如是應至誠恭敬稽首聖尊足所作隨教行勿生疑慮心爾時金剛手白佛言世尊若有諸善男子善女人入此大悲藏生大漫荼羅王三昧耶者彼獲幾所福德聚如是説已佛告金剛手言祕密主從初發心乃至成如來所有福德聚是善男子善女人福德聚與彼正等祕密主以此法門當如是知彼善男子善女人從如來口生佛心之子若是善男子善女人所在方所即為有佛施作佛事是故祕密主若樂欲供養佛者當供養此善男子善女人若樂欲見佛即當觀彼時金剛手等上首執金剛及普賢等上首諸菩薩同聲説言世尊我等從今以後應當恭敬供養是善男子善女人何以故世尊彼善男子善女人同見佛世尊故爾時毗盧遮那世尊復觀一切衆會告執金剛祕密主等諸持金剛者及大衆言善男子有如來出世無量廣長語輪相如巧色摩尼能滿一切願積集無量福德住不可害行三世無比力真言句如是言已金剛手祕密主等諸執金剛及大會衆同聲説言世尊今正是時善逝今正是時爾時毗盧遮那世尊住於滿一切願出廣長舌相遍覆一切佛剎清淨法幢高峯觀三昧時佛從定起爾時發遍一切如來法界哀愍無餘衆生界聲説此大力大護明妃曰南麼薩婆怛他引蘖帝弊毗也反下同一薩婆佩野微蘖帝弊二微濕嚩二合目契弊三薩婆他引唅四羅吃沙上二合摩訶沫麗五薩婆怛他引蘖多六奔昵也二合儞入闍引帝七𤙖𤙖八怛囉二合引磔怛囉二合引磔九阿鉢囉二合底丁以反訶諦十莎訶十一時一切如來及佛子衆説此明已即時普遍佛剎六種震動一切菩薩得未曾有開敷眼於諸佛前以悅意言音而説偈言諸佛甚奇特説此大力護一切佛護持城池皆固密由彼護心住所有為障者毗那夜迦等惡形諸羅剎一切皆退散念真言力故時薄伽梵廣大法界加持即於是時住法界胎藏三昧從此定起説入佛三昧耶持明曰南麼三曼多勃馱喃一阿三迷二咀𭌆二合三迷三三麼曳四莎訶五即於爾時於一切佛剎一切菩薩衆會之中説此入三昧耶明已諸佛子等同聞是者於一切法而不違越時薄伽梵復説法界生真言曰南麼三曼多勃馱喃一達摩馱睹二薩嚩二合婆嚩句痕三金剛薩埵加持真言曰南麼三曼多伐折囉二合赧一伐折囉二合咀麼二合句痕二金剛鎧真言曰南麼三曼多伐折囉二合赧一伐折羅二合迦嚩遮𤙖二如來眼又觀真言曰南麼三曼多勃馱喃一怛他引揭多斫吃芻二合二尾也二合嚩路迦也三莎訶四塗香真言曰南麼三曼多勃馱喃一微輸上馱健杜引納婆二合嚩二莎訶三華真言曰南麼三曼多勃馱喃一摩訶引妹咀𭌆也二合二毗庾二合蘖帝三莎訶四燒香真言曰南麼三曼多勃馱喃一達摩馱睹弩蘖帝二莎訶三飲食真言曰南麼